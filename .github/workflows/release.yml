name: 'Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS only for now: the app bundles a per-arch PDFium library
          # (for scanned-PDF OCR) and resolves it via the macOS .app layout.
          # Linux/Windows would each need their own PDFium binary + path logic.
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            pdfium: 'pdfium-mac-arm64'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            pdfium: 'pdfium-mac-x64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (required by lance build scripts)
        run: brew install protobuf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Fetch PDFium for target arch
        env:
          PDFIUM: ${{ matrix.pdfium }}
        run: |
          curl -sL -o pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${PDFIUM}.tgz"
          tar xzf pdfium.tgz lib/libpdfium.dylib
          mkdir -p src-tauri/libs
          mv lib/libpdfium.dylib src-tauri/libs/libpdfium.dylib
          rm pdfium.tgz

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Code signing is optional: if APPLE_CERTIFICATE isn't set, an unsigned
      # build is produced (users open it via right-click → Open the first time).
      - name: Import Apple certificate (if configured)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret set — building unsigned."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # All optional — present only when Apple Developer secrets are configured.
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: v__VERSION__
          releaseName: 'Alchemy v__VERSION__'
          releaseBody: 'See the assets below to download and install. Requires a local [Ollama](https://ollama.com) install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
