name: 'Release'

# Manual fallback only. The primary release path is scripts/release.sh, run from
# an Apple Silicon machine (faster, and no CI signing-keychain fragility). Use
# this when you can't release locally: trigger it from the Actions tab against a
# tag ref. Requires the APPLE_* repo secrets (see RELEASE.md).
on:
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon only. The app bundles a per-arch PDFium library (for
          # scanned-PDF OCR) resolved via the macOS .app layout. An Intel
          # (x86_64) build is possible on a macos-13 runner but those runners
          # queue for hours; add it back if Intel support is needed.
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            pdfium: 'pdfium-mac-arm64'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc (required by lance build scripts)
        run: brew install protobuf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Fetch PDFium for target arch
        env:
          PDFIUM: ${{ matrix.pdfium }}
        run: |
          curl -sL -o pdfium.tgz \
            "https://github.com/bblanchon/pdfium-binaries/releases/latest/download/${PDFIUM}.tgz"
          tar xzf pdfium.tgz lib/libpdfium.dylib
          mkdir -p src-tauri/libs
          mv lib/libpdfium.dylib src-tauri/libs/libpdfium.dylib
          rm pdfium.tgz

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      # Code signing is optional: if APPLE_CERTIFICATE isn't set, an unsigned
      # build is produced (users open it via right-click → Open the first time).
      - name: Import Apple certificate (if configured)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No APPLE_CERTIFICATE secret set — building unsigned."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          # No auto-lock timeout: the release compile takes ~22 min, far past the
          # 5-min default, and a locked keychain makes codesign hang forever.
          security set-keychain-settings build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

      # The sideloaded PDFium dylib ships ad-hoc-signed; notarization requires
      # every nested Mach-O to carry our Developer ID + secure timestamp +
      # hardened runtime. Sign it here so tauri seals a valid signature.
      - name: Sign bundled PDFium dylib (if signing configured)
        env:
          IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$IDENTITY" ]; then
            echo "No signing identity — leaving PDFium dylib as-is (unsigned build)."
            exit 0
          fi
          codesign --force --timestamp --options runtime \
            --sign "$IDENTITY" src-tauri/libs/libpdfium.dylib
          codesign -dvv src-tauri/libs/libpdfium.dylib 2>&1 | grep -E 'Authority|Timestamp' | head -3

      - name: Keep signing keychain unlocked
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          if security list-keychains | grep -q build.keychain; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings build.keychain
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Real Developer ID when the secret is set; otherwise ad-hoc sign ("-")
          # so the bundle step succeeds (unsigned, un-notarized build).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        with:
          tagName: v__VERSION__
          releaseName: 'Alchemy v__VERSION__'
          releaseBody: 'See the assets below to download and install. Requires a local [Ollama](https://ollama.com) install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # Notarization runs as its own step (not inside tauri) so the GitHub UI
      # shows its duration and notarytool's live output isn't swallowed.
      # Tauri signs (identity above); we submit, staple, and re-upload here.
      - name: Notarize DMG (if configured)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
            echo "Notarization secrets not set — skipping."
            exit 0
          fi
          DMG=$(ls src-tauri/target/*/release/bundle/dmg/*.dmg | head -1)
          TAG="v$(jq -r .version src-tauri/tauri.conf.json)"
          echo "==> notarize start: $(date -u +%FT%TZ)  ($DMG)"
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" \
            --wait
          echo "==> notarize done:  $(date -u +%FT%TZ)"
          xcrun stapler staple "$DMG"
          spctl -a -t open --context context:primary-signature -vv "$DMG"
          echo "==> stapled + verified: $(date -u +%FT%TZ)"
          # tauri-action uploaded the pre-staple DMG; replace with the stapled one.
          gh release upload "$TAG" "$DMG" --clobber
          echo "==> re-uploaded stapled DMG to $TAG"
