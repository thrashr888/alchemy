  <g transform="translate(32 528)" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif">
    <text x="0" y="0" fill="#eceef1" font-size="18" font-weight="600">Read</text>
    <text x="0" y="34" fill="#8a8f98" font-size="15">01 ties most directly to the existing blank-state sigil and research-book motif.</text>
    <text x="0" y="62" fill="#8a8f98" font-size="15">02 is more object-like and distinct in the macOS dock, but less NotebookLM/research-specific.</text>
    <text x="0" y="90" fill="#8a8f98" font-size="15">03 is the boldest small-size mark because the A survives at 16px.</text>
    <text x="0" y="118" fill="#8a8f98" font-size="15">04 is the clearest document/citation metaphor, though the page lines may need simplification for tiny sizes.</text>
  </g>
