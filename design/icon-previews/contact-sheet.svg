  <text x="32" y="78" fill="#8a8f98" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16">Preview only: src-tauri/icons is untouched. Each direction is a 1024 SVG source.</text>

  <g transform="translate(32 112)">
